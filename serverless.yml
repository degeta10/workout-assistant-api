service: workout-assistant-api

useDotenv: true

provider:
  name: aws
  runtime: provided.al2023
  architecture: arm64
  region: ap-south-1
  memorySize: 1024
  timeout: 15
  environment:
    APP_ENV: ${sls:stage}
    APP_NAME: ${env:APP_NAME}
    APP_VERSION: ${env:APP_VERSION}
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_NAME: ${env:DB_NAME}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${ssm:/workout-assistant-api/${sls:stage}/db-password~true}
    JWT_SECRET: ${ssm:/workout-assistant-api/${sls:stage}/jwt-secret~true}

functions:
  api:
    handler: bootstrap
    events:
      - httpApi: "*"

package:
  individually: true
  patterns:
    - "!**"
    - "bootstrap"
