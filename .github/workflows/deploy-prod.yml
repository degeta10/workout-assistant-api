name: Deploy to Production

on:
  push:
    tags:
      - "v*" # This tells GitHub to ONLY run when a tag starting with "v" is pushed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1" # Note: Go 1.24 is the latest as of early 2025. Use the version installed on your machine!

      - name: Run Tests
        run: go test -v ./...

      - name: Setup Node.js (for Serverless Framework)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Build Go Binary
        run: make build

      - name: Deploy to AWS Lambda
        env:
          # You securely store these keys in GitHub Repository Secrets
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: serverless deploy --stage prod
