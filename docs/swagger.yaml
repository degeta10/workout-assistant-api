basePath: /v1
definitions:
  models.AuthRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
      - email
      - password
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
      - email
      - name
      - password
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a high-performance custom workout app.
  title: Workout Assistant API
  version: "1.0"
paths:
  /login:
    post:
      consumes:
        - application/json
      description: Login with email and password to receive a JWT token
      parameters:
        - description: User Credentials
          in: body
          name: credentials
          required: true
          schema:
            $ref: "#/definitions/models.AuthRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate user and return JWT
      tags:
        - auth
  /register:
    post:
      consumes:
        - application/json
      description: Create a user with name, email, and password
      parameters:
        - description: User Registration Data
          in: body
          name: user
          required: true
          schema:
            $ref: "#/definitions/models.RegisterRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
        - auth
swagger: "2.0"
